name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true
      - run: vp install
      - run: vp check
      - run: vp test
      - run: vp pack
